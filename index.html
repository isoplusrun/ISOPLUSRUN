
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>RUN EVENT 2026</h1>
    <div class="menu">☰</div>
</div>

<!-- FORM -->
<div class="container">

    <img src="banner.png" class="banner">

    <!-- CATEGORY -->
    <div class="form-group">
        <label>*Ticket Category</label>
        <select id="category" onchange="updatePrice()">
            <option value="">Choose Category</option>
            <option value="5K">5K</option>
            <option value="10K">10K</option>
            <option value="KID DASH">KID DASH</option>
        </select>
    </div>

    <!-- HARGA -->
    <div class="price-box" id="priceBox">
        Harga: -
    </div>

    <div class="form-group">
        <label>*Full Name</label>
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="form-group">
        <label>*Email</label>
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="form-group">
        <label>*Phone</label>
        <input type="text" id="phone" placeholder="Phone Number">
    </div>

    <div class="form-group">
        <label>*Jersey Size</label>
        <select id="jersey">
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
        </select>
    </div>

    <div class="checkbox">
        <input type="checkbox" id="agree">
        <label>I agree to Rules</label>
    </div>

    <button id="submitBtn" onclick="submitForm()">Submit</button>

</div>

<script src="script.js"></script>

</body>
</html>
